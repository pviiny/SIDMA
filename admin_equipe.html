<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDMA — Corpo Técnico</title>
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <aside class="dashboard-sidebar">
        <a href="index.html" class="dashboard-brand">
            <span>SI<span>DMA</span></span>
        </a>
        <nav class="dashboard-menu">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Visão Geral</a>
            <a href="admin_denuncias.html"><i class="fas fa-inbox"></i> Denuncias</a>
            <a href="admin_mapa.html"><i class="fas fa-map-location-dot"></i> Mapa Critico</a>
            <a href="admin_equipe.html" class="active"><i class="fas fa-users-gear"></i> Equipe</a>
            <a href="admin_relatorios.html"><i class="fas fa-file-export"></i> Relatorios</a>
        </nav>
        <div class="sidebar-status" style="margin-top: auto; padding: 20px; font-size: 0.85rem; color: #666; font-family: 'Poppins', sans-serif;">
            <span><i class="fas fa-circle" style="color: #00e676;"></i> Terminal Ativo</span>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div>
                <span class="dashboard-kicker"><i class="fas fa-users"></i> Controle de Acesso</span>
                <h1>Agentes Credenciados</h1>
                <p>Usuários administrativos ativos responsáveis pela auditoria, triagem e despacho das vistorias de campo.</p>
            </div>
            <div class="dashboard-actions">
                <a href="#" id="btnLogoutDashboard" title="Sair do Terminal" class="logout-btn">
                    <i class="fas fa-right-from-bracket"></i>
                </a>
            </div>
        </header>

        <section id="teamGridList" style="margin-top: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 30px;">
            <div style="grid-column: 1 / -1; color: #444; font-size: 0.9rem; text-align: center; padding: 40px; font-family: 'Poppins', sans-serif;">
                <i class="fas fa-circle-notch fa-spin" style="color: #00e676; margin-bottom: 10px; display: block; font-size: 1.5rem;"></i> 
                Sincronizando banco de credenciais...
            </div>
        </section>
    </main>

    <div id="globalToast" class="toast">
        <i class="fas fa-circle-info" style="color: #00e676; font-size: 1.8rem;"></i>
        <span id="toastMessage"></span>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
